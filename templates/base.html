<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="{{ css_path }}">
  {% if theme_css is defined and theme_css %}
  <style>{{ theme_css }}</style>
  {% endif %}
</head>
<body>
  {% block header %}{% endblock %}
  {% block content %}{% endblock %}
  {% block footer %}{% if footer_text is defined and footer_text %}<div class="doc-footer">{{ footer_text }}</div>{% endif %}{% endblock %}
</body>
</html>
